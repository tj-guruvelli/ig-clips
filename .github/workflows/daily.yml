name: Daily Clip Discovery

on:
  schedule:
    # Runs every day at 8:00 AM UTC (3:00 AM CST / 2:00 AM CT)
    - cron: "0 8 * * *"
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  discover-clips:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.52.0-noble
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Mark workspace as safe for git
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install dependencies
        shell: bash
        run: pip install -r requirements.txt

      # NOTE: the dedup store lives in the repo itself (checked out above and
      # committed back below). An actions/cache restore here previously
      # overwrote the checked-out file with a stale cached copy every run,
      # erasing the store (see commit d1a9864). Do not re-add caching for it.

      - name: Run clip discovery
        shell: bash
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          cd src
          python main.py

      - name: Upload daily report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clips-report-${{ github.run_number }}
          path: output/clips_*.csv
          retention-days: 30
          if-no-files-found: warn

      - name: Commit dedup store back to repo
        if: always()
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f data/found_clips.json ]; then
            echo "No dedup store to commit — skipping."
            exit 0
          fi

          git add data/found_clips.json

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update dedup store [skip ci]"
          git push
