name: Daily Clip Discovery

on:
  schedule:
    # Runs every day at 8:00 AM UTC (3:00 AM CST / 2:00 AM CT)
    - cron: "0 8 * * *"
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  discover-clips:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.48.0-focal
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Restore dedup store
        uses: actions/cache@v4
        with:
          path: data/found_clips.json
          key: dedup-store-${{ github.run_id }}
          restore-keys: |
            dedup-store-

      - name: Run clip discovery
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python main.py

      - name: Save updated dedup store
        uses: actions/cache/save@v4
        with:
          path: data/found_clips.json
          key: dedup-store-${{ github.run_id }}

      - name: Upload daily report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: clips-report-${{ github.run_number }}
          path: output/clips_*.csv
          retention-days: 30

      - name: Commit dedup store back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/found_clips.json
          git diff --staged --quiet || git commit -m "chore: update dedup store [skip ci]"
          git push
